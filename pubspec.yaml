name: bioparque_pantanal
description: "Guia interativo do Bioparque Pantanal - PWA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  go_router: ^14.2.0
  web: ^1.1.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.8.0
  qr_flutter: ^4.1.0
